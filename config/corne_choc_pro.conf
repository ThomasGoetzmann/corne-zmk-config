# Enable mouse emulation.
CONFIG_ZMK_POINTING=y

# CONFIG_ZMK_MOUSE=y

# Change idle settings
# CONFIG_ZMK_IDLE_TIMEOUT=30000

# Deep sleep settings
# CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Custom keyboard name (max. 16 characters)
CONFIG_ZMK_KEYBOARD_NAME="GTCorne"

# Battery indication: green >40%, yellow 20-40%, red <20%, 1s blink
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_RGBLED_WIDGET_BATTERY_SHOW_SELF=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=40
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=20
CONFIG_RGBLED_WIDGET_BATTERY_BLINK_MS=1000
